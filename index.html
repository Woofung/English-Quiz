<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>中翻英拼字考試 Spelling Quiz</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --paper: #f4ede0;
    --paper-dark: #e8dcc4;
    --ink: #2a2620;
    --ink-soft: #5a5048;
    --rule: #c9bfa8;
    --accent: #b8442e;
    --green: #4a7c3a;
    --green-bg: #7fb069;
    --red: #c9392c;
    --red-bg: #e07856;
    --yellow-bg: #f4d35e;
    --gray: #9a9080;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    overflow: hidden;
    transition: background 0.4s ease;
  }
  
  /* 答對 / 答錯：用整片邊框閃爍，而不是改變整個背景，避免遮住內容 */
  body.correct-flash::before,
  body.wrong-flash::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    border: 8px solid transparent;
    box-sizing: border-box;
    animation: flash-fade 0.6s ease-out forwards;
  }
  body.correct-flash::before { border-color: var(--green-bg); }
  body.wrong-flash::before { border-color: var(--red); }
  @keyframes flash-fade {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  
  /* ===== 螢幕切換 ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .screen.active { display: flex; }
  
  /* ===== 頂部紙質紋理 ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: 
      repeating-linear-gradient(transparent 0, transparent 38px, rgba(180,160,120,0.08) 38px, rgba(180,160,120,0.08) 39px);
    z-index: 0;
  }
  
  /* ===== 設定畫面 ===== */
  .setup {
    max-width: 560px;
    width: 100%;
    z-index: 1;
  }
  .setup h1 {
    font-family: 'Didot', 'Bodoni 72', 'Hoefler Text', serif;
    font-size: 56px;
    font-weight: 400;
    letter-spacing: -1px;
    margin-bottom: 8px;
    text-align: center;
  }
  .setup .subtitle {
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }
  
  .field { margin-bottom: 32px; }
  .field label {
    display: block;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  
  .file-drop {
    border: 2px dashed var(--rule);
    border-radius: 4px;
    padding: 32px;
    text-align: center;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
  }
  .file-drop:hover, .file-drop.dragover {
    border-color: var(--accent);
    background: rgba(255,255,255,0.5);
  }
  .file-drop input { display: none; }
  .file-drop .file-icon { font-size: 36px; margin-bottom: 8px; }
  .file-drop .file-name {
    margin-top: 12px;
    color: var(--accent);
    font-weight: bold;
  }
  
  select, button {
    font-family: inherit;
    font-size: 18px;
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    border-radius: 2px;
    cursor: pointer;
  }
  select:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .start-btn {
    background: var(--ink);
    color: var(--paper);
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 18px;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .start-btn:hover:not(:disabled) {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 0 var(--ink);
  }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  
  .info-text {
    margin-top: 16px;
    color: var(--ink-soft);
    font-size: 14px;
    text-align: center;
  }
  
  /* ===== 考試畫面 ===== */
  .quiz {
    width: 100%;
    height: 100%;
    z-index: 1;
    position: relative;
  }
  
  .counter {
    position: absolute;
    top: 32px;
    right: 40px;
    font-family: 'Courier New', monospace;
    font-size: 24px;
    letter-spacing: 2px;
    font-weight: bold;
  }
  .counter .c-correct { color: var(--green); }
  .counter .c-wrong { color: var(--red); }
  .counter .c-sep { color: var(--ink-soft); margin: 0 4px; }
  .counter .c-total { color: var(--ink); }
  
  .round-tag {
    position: absolute;
    top: 32px;
    left: 40px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 6px 12px;
    border: 1px solid var(--rule);
    border-radius: 2px;
  }
  .round-tag.review {
    color: var(--accent);
    border-color: var(--accent);
  }
  
  .word-display {
    position: absolute;
    top: 26%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 90%;
    max-width: 900px;
  }
  .word-display .definition {
    font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Serif TC', serif;
    font-size: 56px;
    font-weight: 400;
    letter-spacing: 2px;
    line-height: 1.2;
    color: var(--ink);
  }
  .word-display .pos {
    margin-top: 18px;
    font-family: 'Iowan Old Style', Palatino, serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 18px;
    letter-spacing: 1px;
  }
  /* 一般模式：首尾字母+字數提示遮罩，例如 n _ _ _ _ _ s （12 字母） */
  .word-display .mask-hint {
    margin-top: 28px;
    font-family: 'Courier New', monospace;
    font-size: 32px;
    letter-spacing: 8px;
    color: var(--ink-soft);
    height: 44px;
    line-height: 1;
  }
  .word-display .mask-hint .mask-count {
    font-family: 'Iowan Old Style', Palatino, serif;
    font-size: 14px;
    letter-spacing: 2px;
    margin-left: 18px;
    color: var(--ink-soft);
    text-transform: uppercase;
    opacity: 0.7;
    vertical-align: middle;
  }
  
  /* 答案輸入區 */
  .answer-area {
    position: absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    width: min(640px, 90%);
    text-align: center;
  }
  .answer-input {
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, serif;
    font-size: 36px;
    width: 100%;
    padding: 16px 20px;
    border: 0;
    border-bottom: 2px solid var(--ink);
    background: transparent;
    color: var(--ink);
    text-align: center;
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .answer-input:focus {
    border-bottom-color: var(--accent);
  }
  .answer-input.correct {
    color: var(--green-bg);
    border-bottom-color: var(--green-bg);
    border-bottom-width: 3px;
  }
  .answer-input.wrong {
    color: var(--red);
    border-bottom-color: var(--red);
    border-bottom-width: 3px;
    text-decoration: line-through;
    text-decoration-thickness: 2px;
  }
  
  /* 正確答案（顯示在題目下方） */
  .correct-answers {
    margin-top: 28px;
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, serif;
    font-size: 26px;
    letter-spacing: 1px;
    min-height: 36px;
    visibility: hidden;
  }
  .correct-answers.show { visibility: visible; }
  .correct-answers .label {
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    margin-right: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .correct-answers .ans {
    color: var(--ink);
    background: #b8e0a0;
    padding: 3px 12px;
    border-radius: 3px;
    font-weight: bold;
    margin: 0 3px;
    border: 1px solid var(--green);
  }
  .correct-answers .ans + .ans {
    margin-left: 6px;
  }
  
  /* 輸入框 + 旁邊「實際意思」 */
  .answer-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    justify-content: center;
  }
  .answer-row .answer-input {
    flex: 0 1 auto;
    width: auto;
    min-width: 360px;
    max-width: 100%;
  }
  .user-answer-meaning {
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    font-size: 18px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    white-space: nowrap;
    visibility: hidden;
    text-align: left;
  }
  .user-answer-meaning.show { visibility: visible; }
  .user-answer-meaning .verb {
    font-style: italic;
    margin-right: 6px;
    color: var(--ink-soft);
  }
  .user-answer-meaning .meaning {
    color: var(--red);
    font-weight: bold;
  }
  
  .press-enter-hint {
    margin-top: 22px;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    text-transform: uppercase;
    visibility: hidden;
    font-style: italic;
    text-align: center;
    opacity: 0.7;
  }
  .press-enter-hint.show { visibility: visible; }
  
  /* 模式切換按鈕（右上角） */
  .mode-panel {
    position: fixed;
    top: 8px;
    right: 8px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }
  .mode-btn {
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink-soft);
    opacity: 0.5;
    transition: opacity 0.2s, background 0.15s;
    white-space: nowrap;
  }
  .mode-btn:hover { opacity: 1; }
  .mode-btn.active {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
    opacity: 1;
  }
  
  .hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .hint kbd {
    font-family: 'Courier New', monospace;
    border: 1px solid var(--rule);
    padding: 2px 6px;
    border-radius: 2px;
    background: rgba(255,255,255,0.4);
    margin: 0 2px;
  }
  
  /* ===== 結果畫面 ===== */
  .result {
    width: min(800px, 92%);
    max-height: 90vh;
    overflow-y: auto;
    padding: 48px 56px;
    background: rgba(255,255,255,0.3);
    border: 1px solid var(--rule);
    z-index: 1;
  }
  .result h2 {
    font-family: 'Didot', 'Bodoni 72', serif;
    font-size: 24px;
    font-weight: 400;
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .result .fart-count {
    font-family: 'Marker Felt', 'Comic Sans MS', 'Chalkboard', cursive;
    text-align: center;
    font-size: 56px;
    line-height: 1.15;
    margin-bottom: 36px;
    color: var(--accent);
    font-weight: bold;
    transform: rotate(-2deg);
    text-shadow: 3px 3px 0 var(--paper-dark);
  }
  .result .fart-count.zero {
    color: var(--green);
    transform: rotate(-1deg);
  }
  .result .fart-emoji {
    display: inline-block;
    font-size: 64px;
    margin-right: 8px;
    vertical-align: middle;
    transform: rotate(-15deg) translateY(-4px);
  }
  .result .score {
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  .result .score .s-correct { color: var(--green); }
  .result .score .s-wrong { color: var(--red); }
  .result .score .s-total { color: var(--ink); }
  .result .score .s-sep { color: var(--ink-soft); margin: 0 6px; font-weight: normal; }
  .result .score-percent {
    text-align: center;
    color: var(--ink-soft);
    font-size: 18px;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }
  
  .result .section-title {
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 12px;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 8px;
    margin-bottom: 16px;
  }
  
  .wrong-list { list-style: none; }
  .wrong-list li {
    padding: 12px 0;
    border-bottom: 1px dashed var(--rule);
    font-size: 17px;
    line-height: 1.6;
  }
  .wrong-list .w-word {
    font-family: 'Didot', serif;
    font-size: 22px;
    font-weight: bold;
    margin-right: 16px;
  }
  .wrong-list .w-correct {
    color: var(--green);
    margin-left: 8px;
  }
  .wrong-list .w-x {
    color: var(--red);
    font-weight: bold;
    margin: 0 8px;
  }
  .wrong-list .w-picked {
    color: var(--red);
    text-decoration: line-through;
  }
  .perfect {
    text-align: center;
    font-style: italic;
    color: var(--green);
    padding: 24px;
    font-size: 20px;
  }
  
  .result-actions {
    display: flex;
    gap: 12px;
    margin-top: 40px;
  }
  .result-actions button { flex: 1; }
  
  .error-msg {
    color: var(--red);
    background: rgba(201,57,44,0.1);
    border: 1px solid var(--red);
    padding: 12px;
    margin-top: 16px;
    border-radius: 2px;
    font-size: 14px;
  }
  
  .saved-file {
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 14px;
  }
  .saved-file .saved-info {
    flex: 1;
    color: var(--ink-soft);
  }
  .saved-file .saved-info strong {
    color: var(--accent);
    font-weight: bold;
  }
  .saved-file .saved-info .meta {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .saved-file button {
    width: auto;
    padding: 6px 12px;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--ink-soft);
    color: var(--ink-soft);
  }
  .saved-file button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  
  @media (max-width: 600px) {
    .word-display .word { font-size: 56px; }
    .options { grid-template-columns: 1fr; gap: 8px; bottom: 32px; }
    .option { padding: 14px; font-size: 17px; min-height: 52px; }
    .counter { font-size: 18px; top: 16px; right: 16px; }
    .round-tag { top: 16px; left: 16px; font-size: 11px; }
    .result { padding: 32px 24px; }
    .result h2 { font-size: 36px; }
  }
</style>
</head>
<body>

<!-- 模式切換按鈕（右上角） -->
<div class="mode-panel" id="mode-panel" style="display:none">
  <button class="mode-btn" id="mode-easy">簡單模式</button>
  <button class="mode-btn active" id="mode-normal">一般模式</button>
</div>

<!-- ============ 設定畫面 ============ -->
<div class="screen active" id="setup-screen">
  <div class="setup">
    <h1>Spelling Quiz</h1>
    <p class="subtitle">— 中翻英拼字 —</p>
    
    <!-- 隱藏的上傳區（保留 DOM 與相關 JS 邏輯，但不顯示） -->
    <div class="field" style="display:none">
      <label>上傳 Excel 檔</label>
      <div id="saved-file-area"></div>
      <label class="file-drop" id="file-drop">
        <div class="file-icon">📖</div>
        <div>點此選擇檔案，或拖曳檔案到此</div>
        <div class="file-name" id="file-name"></div>
        <input type="file" id="file-input" accept=".xlsx,.xls">
      </label>
      <div id="error-msg"></div>
    </div>
    
    <div class="field">
      <label>選擇章節</label>
      <select id="chapter-select" disabled>
        <option>字庫載入中…</option>
      </select>
    </div>
    
    <div class="field">
      <label>難度模式</label>
      <div style="display:flex; gap:10px;">
        <button id="setup-mode-easy" class="setup-mode-btn" style="flex:1; padding:14px; border:1.5px solid var(--ink); background:var(--paper); color:var(--ink); cursor:pointer; font-family:inherit; font-size:15px;">簡單<br><span style="font-size:11px; opacity:0.7; font-style:italic;">提示首尾字母 + 字數</span></button>
        <button id="setup-mode-normal" class="setup-mode-btn active" style="flex:1; padding:14px; border:1.5px solid var(--ink); background:var(--ink); color:var(--paper); cursor:pointer; font-family:inherit; font-size:15px;">一般<br><span style="font-size:11px; opacity:0.7; font-style:italic;">中文意思 → 任一英文同義字</span></button>
      </div>
    </div>
    
    <button class="start-btn" id="start-btn" disabled>開始考試</button>
    <p class="info-text" id="info-text">輸入英文 · Enter 確認</p>
    <div id="error-msg-visible" style="color: var(--accent); font-size: 14px; margin-top: 12px; text-align: center;"></div>
  </div>
</div>

<!-- ============ 考試畫面 ============ -->
<div class="screen" id="quiz-screen">
  <div class="quiz">
    <div class="round-tag" id="round-tag">FIRST ROUND</div>
    <div class="counter">
      <span class="c-correct" id="c-correct">00</span><span class="c-sep">/</span><span class="c-wrong" id="c-wrong">00</span><span class="c-sep">/</span><span class="c-total" id="c-total">00</span>
    </div>
    <div class="word-display">
      <div class="definition" id="definition"></div>
      <div class="pos" id="pos"></div>
      <div class="mask-hint" id="mask-hint"></div>
      <div class="correct-answers" id="correct-answers"></div>
    </div>
    <div class="answer-area">
      <div class="answer-row">
        <input type="text" class="answer-input" id="answer-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="user-answer-meaning" id="user-answer-meaning"></div>
      </div>
      <div class="press-enter-hint" id="press-enter-hint"></div>
    </div>
    <div class="hint" id="hint">
      輸入英文 &nbsp;·&nbsp; <kbd>Enter</kbd> 確認
    </div>
  </div>
</div>

<!-- ============ 結果畫面 ============ -->
<div class="screen" id="result-screen">
  <div class="result">
    <h2>考試結束</h2>
    <div class="fart-count" id="fart-count"></div>
    <div class="score">
      <span class="s-correct" id="r-correct">00</span><span class="s-sep">/</span><span class="s-wrong" id="r-wrong">00</span><span class="s-sep">/</span><span class="s-total" id="r-total">00</span>
    </div>
    <div class="score-percent" id="r-percent"></div>
    
    <div class="section-title">錯題回顧</div>
    <div id="wrong-container"></div>
    
    <div class="result-actions">
      <button id="retry-btn">同章節再來一次</button>
      <button id="back-btn">回到主選單</button>
    </div>
  </div>
</div>

<script>
'use strict';

// =============== 音效（使用 Web Audio API 即時合成）===============
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrectSound() {
  // 三音上行琶音 — 雀躍
  const ctx = getAudioCtx();
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const start = ctx.currentTime + i * 0.07;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.18, start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.25);
    osc.start(start);
    osc.stop(start + 0.3);
  });
}

function playWrongSound() {
  // 短促但飽滿的放屁聲：低頻 + 顫動 + 尾音上揚
  const ctx = getAudioCtx();
  const start = ctx.currentTime;
  const duration = 0.85;
  
  // 主音 — 低頻鋸齒波
  // 頻率走勢：開頭 170Hz，前 60% 緩降到 110Hz，最後 40% 上揚到 220Hz（尾音上揚）
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(170, start);
  osc.frequency.linearRampToValueAtTime(110, start + duration * 0.55);
  osc.frequency.linearRampToValueAtTime(220, start + duration);
  
  // 顫音 LFO 模擬「噗噗噗」氣音感
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = 22;
  lfoGain.gain.value = 28;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);
  
  // 音量包絡：快速起音、中段穩定、尾段稍微再強調一下上揚
  gain.gain.setValueAtTime(0, start);
  gain.gain.linearRampToValueAtTime(0.55, start + 0.03);
  gain.gain.setValueAtTime(0.55, start + duration * 0.55);
  gain.gain.linearRampToValueAtTime(0.45, start + duration * 0.85);
  gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
  
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start + duration + 0.05);
  lfo.start(start);
  lfo.stop(start + duration + 0.05);
  
  // 噪音層 — 加強氣感，尾段變稀薄
  const bufferSize = Math.floor(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    const t = i / bufferSize;
    const wobble = 1 + 0.35 * Math.sin(i / ctx.sampleRate * 22 * Math.PI * 2);
    // 噪音在尾段衰減更快，讓上揚的主音更突出
    const env = t < 0.55 ? (1 - t * 0.3) : (1 - t) * 1.2;
    data[i] = (Math.random() * 2 - 1) * wobble * Math.max(0, env) * 0.5;
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const noiseGain = ctx.createGain();
  noiseGain.gain.value = 0.35;
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  // 濾波器頻率也跟著上揚
  filter.frequency.setValueAtTime(450, start);
  filter.frequency.linearRampToValueAtTime(700, start + duration);
  noise.connect(filter);
  filter.connect(noiseGain);
  noiseGain.connect(ctx.destination);
  noise.start(start);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// =============== IndexedDB（用來記住上次的 Excel）===============
const DB_NAME = 'vocab-quiz-db';
const STORE_NAME = 'files';
const FILE_KEY = 'last-excel';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveExcelToDB(name, arrayBuffer) {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put({
      name,
      buffer: arrayBuffer,
      savedAt: new Date().toISOString()
    }, FILE_KEY);
    return new Promise(resolve => {
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); resolve(); };
    });
  } catch (e) {
    console.warn('無法儲存到 IndexedDB:', e);
  }
}

async function loadExcelFromDB() {
  try {
    const db = await openDB();
    return await new Promise(resolve => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(FILE_KEY);
      req.onsuccess = () => { db.close(); resolve(req.result || null); };
      req.onerror = () => { db.close(); resolve(null); };
    });
  } catch (e) {
    return null;
  }
}

async function clearSavedExcel() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(FILE_KEY);
    return new Promise(resolve => {
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); resolve(); };
    });
  } catch (e) {}
}

// =============== Excel 解析（核心）===============
function parseExcelBuffer(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws);
  
  if (!rows.length) {
    throw new Error('檔案是空的');
  }
  
  // 偵測欄位名稱（容錯處理：英文/中文）
  const sample = rows[0];
  const keys = Object.keys(sample);
  const findKey = (...candidates) => {
    for (const c of candidates) {
      const found = keys.find(k => k.toLowerCase().includes(c.toLowerCase()));
      if (found) return found;
    }
    return null;
  };
  
  const kChapter = findKey('chapter', '章節', '章');
  const kWord = findKey('vocabulary', 'word', '單字', '英文');
  const kDef = findKey('chinese', 'definition', '解釋', '翻譯', '中文');
  const kPos = findKey('part of speech', 'pos', '詞性');
  
  if (!kChapter || !kWord || !kDef) {
    throw new Error('無法辨識欄位。需要包含「Chapter」、「Vocabulary」、「Chinese Explanation」欄位');
  }
  
  allRows = rows.map(r => ({
    chapter: String(r[kChapter] || '').trim(),
    word: String(r[kWord] || '').trim(),
    def: String(r[kDef] || '').trim(),
    pos: kPos ? String(r[kPos] || '').trim() : ''
  })).filter(r => r.chapter && r.word && r.def);
  
  // 除錯：印出有 3 個以上翻譯的字（在 Console 看 F12）
  const multi = allRows.filter(r => r.def.split(';').length >= 3);
  console.log(`[Excel 載入] 共 ${allRows.length} 字，其中 ${multi.length} 字有 3+ 個翻譯`);
  if (multi.length > 0) {
    console.log('範例：', multi.slice(0, 5).map(r => `${r.word} → ${r.def}`).join(' | '));
  }
  
  // 分組
  chaptersMap = {};
  for (const r of allRows) {
    if (!chaptersMap[r.chapter]) chaptersMap[r.chapter] = [];
    chaptersMap[r.chapter].push(r);
  }
  
  // 章節排序：依 Chapter 後的數字
  const sortedChapters = Object.keys(chaptersMap).sort((a, b) => {
    const na = parseInt(a.match(/\d+/)?.[0] || '0');
    const nb = parseInt(b.match(/\d+/)?.[0] || '0');
    return na - nb;
  });
  
  chapterSelect.innerHTML = '';
  sortedChapters.forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch;
    opt.textContent = `${ch}（${chaptersMap[ch].length} 字）`;
    chapterSelect.appendChild(opt);
  });
  chapterSelect.disabled = false;
  startBtn.disabled = false;
}

// === 從使用者選的檔案讀取（會儲存到 DB）===
function loadExcelFromFile(file) {
  fileName.textContent = file.name;
  clearError();
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const buffer = e.target.result;
      parseExcelBuffer(buffer);
      // 成功的話存到 IndexedDB 供下次使用
      await saveExcelToDB(file.name, buffer);
      renderSavedFileBanner(file.name, new Date().toISOString());
    } catch (err) {
      console.error(err);
      showError('讀取檔案失敗：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// === 從 IndexedDB 自動載入上次的檔案 ===
async function tryAutoLoadSavedExcel() {
  const saved = await loadExcelFromDB();
  if (!saved) return false;
  try {
    parseExcelBuffer(saved.buffer);
    fileName.textContent = saved.name;
    renderSavedFileBanner(saved.name, saved.savedAt, 'local');
    return true;
  } catch (e) {
    console.warn('自動載入失敗:', e);
    await clearSavedExcel();
    return false;
  }
}

// === 啟動時嘗試從同個資料夾抓預設 Excel 檔（給雲端部署用）===
// 把 Excel 放在跟 index.html 同一個資料夾，下面這個 DEFAULT_EXCEL_URL 指向它
const DEFAULT_EXCEL_URL = 'vocabulary.xlsx';   // 相對路徑，會跟著網頁 host 走

async function tryLoadDefaultExcel() {
  try {
    // 加上時間戳記參數避免瀏覽器/CDN 快取舊檔
    const url = DEFAULT_EXCEL_URL + '?t=' + Date.now();
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) return false;
    const contentType = resp.headers.get('Content-Type') || '';
    // 確保抓到的真的是 Excel 檔，不是 GitHub 的 404 HTML 頁面
    const buffer = await resp.arrayBuffer();
    if (buffer.byteLength < 100) return false;
    // 簡單檢查：xlsx 檔開頭是 PK (zip 格式)
    const view = new Uint8Array(buffer.slice(0, 2));
    if (view[0] !== 0x50 || view[1] !== 0x4B) return false;
    
    parseExcelBuffer(buffer);
    fileName.textContent = DEFAULT_EXCEL_URL;
    // 同時存到 IndexedDB 讓沒網路時也能用
    await saveExcelToDB(DEFAULT_EXCEL_URL, buffer);
    renderSavedFileBanner(DEFAULT_EXCEL_URL, new Date().toISOString(), 'cloud');
    return true;
  } catch (e) {
    return false;
  }
}

// 把 def 字串拆成翻譯陣列、做 trim
function splitDefs(defStr) {
  return String(defStr || '').split(';').map(s => s.trim()).filter(Boolean);
}

// 把 pos 字串去重後合併（避免顯示 verb;verb;verb，改成 verb；如有 noun;verb 則留下兩個）
function uniqPos(posStr) {
  const list = String(posStr || '').split(';').map(s => s.trim()).filter(Boolean);
  const seen = new Set();
  const out = [];
  for (const p of list) {
    if (!seen.has(p)) { seen.add(p); out.push(p); }
  }
  return out.join(' / ');
}

function buildQuestion(target) {
  const correctDefs = splitDefs(target.def);  // 該字的所有翻譯
  return {
    word: String(target.word).trim(),
    posDisplay: uniqPos(target.pos),
    correctDefs,                  // 顯示給使用者看的中文翻譯
    correctDefsRaw: target.def,
  };
}

// 簡單模式判定：學生輸入的英文，它的「翻譯之一」必須在題目顯示的翻譯之內
// = 學生答案對應的英文單字（跨整個 allRows）裡，找有對應到題目顯示翻譯的字
// 預先建立 word → defs 的快取
let wordToDefsMap = null;
function getWordToDefsMap() {
  if (wordToDefsMap) return wordToDefsMap;
  wordToDefsMap = {};
  for (const r of allRows) {
    const w = String(r.word).trim().toLowerCase();
    if (!wordToDefsMap[w]) wordToDefsMap[w] = new Set();
    splitDefs(r.def).forEach(d => wordToDefsMap[w].add(d));
  }
  return wordToDefsMap;
}

// 簡單模式：題目顯示了 N 個翻譯，學生答案對應的翻譯必須包含「題目所有顯示的翻譯」
// 嚴格交集：學生答案的翻譯集合 ⊇ 題目顯示的翻譯集合
function isCorrectEasy(userWord, qDefs) {
  const map = getWordToDefsMap();
  const w = userWord.trim().toLowerCase();
  if (!w) return false;
  const userDefs = map[w];
  if (!userDefs) return false;  // 學生打的字不在字庫裡
  // 必須題目所有翻譯都在學生這個字的翻譯集合裡
  for (const d of qDefs) {
    if (!userDefs.has(d)) return false;
  }
  return true;
}

// 一般模式：完全相同（忽略大小寫和首尾空白）
function isCorrectNormal(userWord, targetWord) {
  return userWord.trim().toLowerCase() === targetWord.trim().toLowerCase();
}

// 簡單模式提示遮罩：n _ _ _ _ _ s
// 兩字母單字（如 by、me）只顯示首字母，避免變相直接給出答案
function buildMaskHint(word) {
  const w = word.trim();
  if (w.length === 0) return '';
  if (w.length === 1) return w;
  if (w.length === 2) return w[0] + ' _';
  const middle = Array(w.length - 2).fill('_').join(' ');
  return w[0] + ' ' + middle + ' ' + w[w.length - 1];
}

// 簡單模式：找出題目「所有顯示翻譯都對應到」的英文單字（用於答錯時顯示正解）
function findValidAnswers(qDefs) {
  const map = getWordToDefsMap();
  const valid = [];
  for (const w in map) {
    const defs = map[w];
    let ok = true;
    for (const d of qDefs) {
      if (!defs.has(d)) { ok = false; break; }
    }
    if (ok) valid.push(w);
  }
  return valid;
}

// =============== 渲染題目 ===============
function renderQuestion() {
  if (qIndex >= questions.length) {
    if (!isReviewRound && reviewQueue.length > 0) {
      isReviewRound = true;
      questions = reviewQueue.map(w => buildQuestion(w));
      qIndex = 0;
      reviewQueue = [];
      const tag = document.getElementById('round-tag');
      tag.textContent = `REVIEW · ${questions.length} 題`;
      tag.classList.add('review');
      setTimeout(renderQuestion, 100);
      return;
    }
    showResult();
    return;
  }
  
  const q = questions[qIndex];
  
  // 中文翻譯顯示（用 ；分隔）
  document.getElementById('definition').textContent = q.correctDefs.join('；');
  document.getElementById('pos').textContent = q.posDisplay || '';
  
  // 簡單模式才顯示首尾字母提示
  const maskEl = document.getElementById('mask-hint');
  if (currentMode === 'easy') {
    maskEl.innerHTML = buildMaskHint(q.word) +
      `<span class="mask-count">${q.word.length} letters</span>`;
  } else {
    maskEl.innerHTML = '';
  }
  
  // 清空輸入框 + 把焦點放上去
  const input = document.getElementById('answer-input');
  input.value = '';
  input.classList.remove('correct', 'wrong');
  input.disabled = false;
  setTimeout(() => input.focus(), 50);
  
  // 清空正解區、實際意思區、按鍵提示
  const ansBox = document.getElementById('correct-answers');
  ansBox.classList.remove('show');
  ansBox.innerHTML = '';
  const meaningEl = document.getElementById('user-answer-meaning');
  meaningEl.classList.remove('show');
  meaningEl.innerHTML = '';
  const pressEnterEl = document.getElementById('press-enter-hint');
  pressEnterEl.classList.remove('show');
  pressEnterEl.innerHTML = '';
  
  locked = false;
  document.body.classList.remove('locked');
  updateCounter();
}

function updateCounter() {
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('c-correct').textContent = pad(stats.correct);
  document.getElementById('c-wrong').textContent = pad(stats.wrong);
  document.getElementById('c-total').textContent = pad(stats.total);
}

// =============== 提交答案 ===============
let waitingForNext = false;  // 答錯後等待第二次 Enter 才下一題

function submitAnswer() {
  if (locked) return;
  
  const q = questions[qIndex];
  const input = document.getElementById('answer-input');
  const userAnswer = input.value.trim();
  
  if (userAnswer === '') return;  // 空字串不送出
  
  locked = true;
  document.body.classList.add('locked');
  input.disabled = true;
  
  let correct = false;
  let validAnswers;
  
  if (currentMode === 'easy') {
    // 簡單模式：給首尾字母提示 → 必須完全相同
    correct = isCorrectNormal(userAnswer, q.word);
    validAnswers = [q.word];
  } else {
    // 一般模式：無提示 → 任一同義字都對（嚴格交集）
    correct = isCorrectEasy(userAnswer, q.correctDefs);
    validAnswers = findValidAnswers(q.correctDefs);
    if (!validAnswers.map(w => w.toLowerCase()).includes(q.word.toLowerCase())) {
      validAnswers.unshift(q.word);
    }
  }
  
  if (correct) {
    document.body.classList.add('correct-flash');
    input.classList.add('correct');
    if (!isReviewRound) stats.correct++;
    playCorrectSound();
    waitingForNext = false;
    
    // 答對：顯示正解資訊（讓學生看到完整答案 / 同義字）
    const ansBox = document.getElementById('correct-answers');
    ansBox.innerHTML = `<span class="label">正確答案</span>` +
      validAnswers.map(w => `<span class="ans">${w}</span>`).join('');
    ansBox.classList.add('show');
    
    // 1.5 秒後自動下一題
    setTimeout(() => {
      document.body.classList.remove('correct-flash', 'wrong-flash');
      qIndex++;
      renderQuestion();
    }, 1500);
  } else {
    document.body.classList.add('wrong-flash');
    input.classList.add('wrong');
    
    // 1. 在題目下方顯示正確答案（一個或多個）
    const ansBox = document.getElementById('correct-answers');
    ansBox.innerHTML = `<span class="label">正確答案</span>` +
      validAnswers.map(w => `<span class="ans">${w}</span>`).join('');
    ansBox.classList.add('show');
    
    // 2. 在學生輸入的字旁邊顯示「是 XXX」（若該字在字庫裡，顯示中文意思）
    const userMeaning = lookupMeaning(userAnswer);
    const meaningEl = document.getElementById('user-answer-meaning');
    if (userMeaning) {
      meaningEl.innerHTML = `<span class="verb">是</span><span class="meaning">${userMeaning}</span>`;
    } else {
      meaningEl.innerHTML = `<span class="verb">不是英文單字</span>`;
    }
    meaningEl.classList.add('show');
    
    // 3. 提示「再按 Enter 繼續」
    const pressEnterEl = document.getElementById('press-enter-hint');
    pressEnterEl.textContent = '— 再按一次 Enter 繼續 —';
    pressEnterEl.classList.add('show');
    
    if (!isReviewRound) {
      stats.wrong++;
      stats.wrongList.push({
        word: q.word,
        correctDefs: q.correctDefs.join('；'),
        validAnswers: validAnswers.join(' / '),
        userAnswer: userAnswer
      });
      const original = chaptersMap[currentChapter].find(w => w.word === q.word);
      if (original) reviewQueue.push(original);
    }
    playWrongSound();
    // 把 waitingForNext = true 延後一個 tick，避免同一次 Enter 事件冒泡到 document listener
    // 立刻被當成「再按一次」而跳到下一題
    setTimeout(() => { waitingForNext = true; }, 0);
    
    setTimeout(() => {
      document.body.classList.remove('correct-flash', 'wrong-flash');
    }, 600);
  }
  updateCounter();
}

// 查學生輸入的英文，回傳它的中文意思（若有）
function lookupMeaning(userWord) {
  const map = getWordToDefsMap();
  const w = userWord.trim().toLowerCase();
  const defs = map[w];
  if (!defs) return null;
  return Array.from(defs).join('；');
}

function advanceAfterWrong() {
  // 答錯後第二次按 Enter 才呼叫
  waitingForNext = false;
  qIndex++;
  renderQuestion();
}

// =============== 鍵盤事件 ===============
const answerInputEl = document.getElementById('answer-input');
answerInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    e.stopPropagation();  // 不讓同一次 Enter 冒泡到 document listener
    if (waitingForNext) {
      advanceAfterWrong();
    } else if (!locked) {
      submitAnswer();
    }
  }
});

// 全域 Enter（即使 input 沒 focus，按 Enter 也能繼續）
document.addEventListener('keydown', e => {
  if (!document.getElementById('quiz-screen').classList.contains('active')) return;
  if (e.key === 'Enter' && waitingForNext) {
    e.preventDefault();
    advanceAfterWrong();
  }
});

// =============== 結果畫面 ===============
function showResult() {
  document.getElementById('mode-panel').style.display = 'none';
  
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('r-correct').textContent = pad(stats.correct);
  document.getElementById('r-wrong').textContent = pad(stats.wrong);
  document.getElementById('r-total').textContent = pad(stats.total);
  const pct = ((stats.correct / stats.total) * 100).toFixed(1);
  document.getElementById('r-percent').textContent = `正確率 ${pct}%`;
  
  const fartEl = document.getElementById('fart-count');
  if (stats.wrong === 0) {
    fartEl.innerHTML = `<span class="fart-emoji">✨</span>一次屁都沒放！`;
    fartEl.classList.add('zero');
  } else {
    fartEl.innerHTML = `<span class="fart-emoji">💨</span>放屁 ${stats.wrong} 次`;
    fartEl.classList.remove('zero');
  }
  
  const wc = document.getElementById('wrong-container');
  if (stats.wrongList.length === 0) {
    wc.innerHTML = '<div class="perfect">✦ 全部答對 ✦</div>';
  } else {
    const ul = document.createElement('ul');
    ul.className = 'wrong-list';
    stats.wrongList.forEach(w => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="w-word">${w.correctDefs}</span>
        <span class="w-correct">${w.validAnswers}</span>
        <span class="w-x">×</span>
        <span class="w-picked">${w.userAnswer}</span>
      `;
      ul.appendChild(li);
    });
    wc.innerHTML = '';
    wc.appendChild(ul);
  }
  
  switchScreen('result-screen');
}

document.getElementById('retry-btn').addEventListener('click', () => {
  startQuiz(chaptersMap[currentChapter]);
});
document.getElementById('back-btn').addEventListener('click', () => {
  switchScreen('setup-screen');
});

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
